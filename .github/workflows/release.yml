name: Release & Publish

on:
  push:
    tags:
      - "v*"

# Least privilege by default; only the github-release job opts into write.
permissions:
  contents: read

jobs:
  # Gate the release: tests must pass and the tag must match the package version
  # before anything is built or published.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Verify tag matches package version
        run: |
          # Read the installed dist metadata (robust regardless of working dir).
          VERSION=$(python3 -c "import importlib.metadata as m; print(m.version('ailog-cli'))")
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version v${VERSION}"
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches package version v${VERSION}."

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
